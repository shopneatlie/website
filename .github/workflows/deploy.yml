name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Project pages are served from /neat-lie/. Remove this once
          # the custom domain is connected.
          BASE_PATH: /neat-lie/
      # The prerendered page is emitted under the basename subdirectory,
      # but the Pages artifact root is already served at /neat-lie/, so
      # hoist it over the SPA fallback at the root.
      - run: |
          mv build/client/neat-lie/index.html build/client/index.html
          rmdir build/client/neat-lie
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
